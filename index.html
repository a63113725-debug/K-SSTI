<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-SSTI 거리 생존 유형 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f2eb;
    --card:#ffffff;
    --caution:#e8b400;
    --caution-bg:#fff8d6;
    --coral:#e84c2b;
    --coral-bg:#fff0ed;
    --dark:#171714;
    --mid:#5a5a54;
    --soft:#9a9a90;
    --line:#e0ddd4;
    --paper:#171714;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--dark);
    font-family:'Noto Sans KR', -apple-system, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 14px;
  }
  .stage{
    width:100%;
    max-width:480px;
    position:relative;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 8px 40px -8px rgba(0,0,0,.12);
  }
  .tape{
    height:14px;
    width:100%;
    background:repeating-linear-gradient(135deg, var(--caution) 0 18px, var(--dark) 18px 36px);
  }
  .pad{ padding:30px 26px 28px; }

  /* progress */
  .progress-wrap{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .progress-track{flex:1; height:6px; background:var(--line); border-radius:99px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--caution); width:0%; transition:width .35s ease;}
  .progress-label{font-size:12px; color:var(--soft); font-weight:700; white-space:nowrap;}

  .eyebrow{
    display:inline-block;
    font-size:11px;
    letter-spacing:.14em;
    font-weight:700;
    color:#fff;
    background:var(--dark);
    padding:4px 10px;
    border-radius:5px;
    margin-bottom:14px;
  }

  h1.display{
    font-family:'Noto Sans KR', sans-serif;
    font-size:26px;
    font-weight:900;
    line-height:1.45;
    margin:0 0 16px;
    letter-spacing:-.03em;
    color:var(--dark);
    word-break:keep-all;
  }
  h1.display .hl{color:var(--caution);}
  h1.display .hl2{color:var(--coral);}

  .hashrow{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:16px;
  }
  .hashrow span{
    font-size:12px; font-weight:700;
    background:var(--coral-bg);
    color:var(--coral);
    padding:5px 9px;
    border-radius:99px;
  }

  p.body{
    font-size:14.5px;
    line-height:1.85;
    color:var(--mid);
    margin:0 0 12px;
    word-break:keep-all;
  }
  p.body strong{color:var(--dark);}

  .meta-row{
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--soft); font-weight:600;
    margin:18px 0 22px;
    padding-top:16px;
    border-top:1px dashed var(--line);
  }

  button.cta{
    width:100%;
    background:var(--dark);
    color:#fff;
    border:none;
    font-family:'Noto Sans KR',sans-serif;
    font-weight:900;
    font-size:16px;
    padding:17px 18px;
    border-radius:12px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .15s ease, opacity .2s ease;
    letter-spacing:-.02em;
  }
  button.cta:hover{ opacity:.88; transform:translateY(-1px); }
  button.cta:active{ transform:translateY(0); }

  /* question screen */
  .qnum{
    font-size:12px;
    font-weight:700;
    color:var(--caution);
    letter-spacing:.1em;
    margin-bottom:6px;
    background:var(--caution-bg);
    display:inline-block;
    padding:3px 9px;
    border-radius:5px;
    margin-bottom:12px;
  }
  h2.qtitle{
    font-family:'Noto Sans KR', sans-serif;
    font-size:20px;
    font-weight:900;
    line-height:1.55;
    margin:0 0 22px;
    color:var(--dark);
    letter-spacing:-.03em;
    word-break:keep-all;
  }
  .options{ display:flex; flex-direction:column; gap:10px; }
  .opt{
    text-align:left;
    background:#fafaf8;
    border:1.5px solid var(--line);
    color:var(--dark);
    padding:15px 16px;
    border-radius:12px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    line-height:1.6;
    transition:all .15s ease;
    display:flex; gap:10px; align-items:flex-start;
    font-family:'Noto Sans KR',sans-serif;
    word-break:keep-all;
  }
  .opt .dot{
    flex-shrink:0; width:8px; height:8px; margin-top:6px;
    border-radius:50%; background:var(--line);
    transition:background .15s ease;
  }
  .opt:hover{ border-color:var(--caution); background:var(--caution-bg); }
  .opt:hover .dot{ background:var(--caution); }

  .navbar{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:22px;
  }
  .backlink{
    font-size:13px; color:var(--soft); font-weight:700;
    background:none; border:none; cursor:pointer;
    display:flex; align-items:center; gap:4px;
    padding:6px 0;
    font-family:'Noto Sans KR',sans-serif;
  }
  .backlink:hover{ color:var(--dark); }
  .backlink:disabled{ opacity:0; pointer-events:none; }

  /* result screen */
  .result-hero{
    text-align:center;
    padding-top:6px;
  }
  .typebadge{
    display:inline-block;
    font-size:12px; font-weight:700;
    color:#fff;
    background:var(--dark);
    padding:5px 12px;
    border-radius:99px;
    letter-spacing:.05em;
    margin-bottom:14px;
  }
  .charwrap{
    width:100%;
    max-width:360px;
    aspect-ratio:4/5;
    margin:0 auto 20px;
    border-radius:16px;
    overflow:hidden;
    border:3px solid var(--caution);
  }
  .charwrap img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:center top;
    display:block;
  }

  h2.resulttitle{
    font-family:'Noto Sans KR', sans-serif;
    font-size:26px;
    font-weight:900;
    margin:0 0 6px;
    color:var(--dark);
    letter-spacing:-.04em;
    word-break:keep-all;
  }
  p.resultline{
    font-size:14px; color:var(--coral); font-weight:700;
    margin:0 0 22px;
    word-break:keep-all;
  }

  .statbox{
    background:#fafaf8;
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 18px 14px;
    margin-bottom:18px;
    text-align:left;
  }
  .statrow{
    display:flex; align-items:center; gap:10px;
    margin-bottom:11px;
  }
  .statrow:last-child{margin-bottom:0;}
  .statname{ width:80px; flex-shrink:0; color:var(--mid); font-weight:600; font-size:13px;}
  .stars{ letter-spacing:2px; color:var(--caution); font-size:15px; }
  .stars .off{ color:var(--line); }

  .desc-block{ text-align:left; margin-bottom:18px;}
  .desc-block p{ font-size:13.5px; line-height:1.85; color:var(--mid); margin:0 0 10px; word-break:keep-all;}
  .desc-block p:last-child{margin-bottom:0;}

  .tagrow{
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center;
    margin-bottom:18px;
  }
  .tagrow span{
    font-size:12px; font-weight:700;
    background:var(--caution-bg);
    color:#8a6c00;
    padding:5px 10px; border-radius:99px;
  }

  .insta-cta{
    background:var(--coral-bg);
    border:1.5px solid rgba(232,76,43,.2);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:16px;
    text-align:center;
  }
  .insta-cta p{
    font-size:13px; color:var(--mid); line-height:1.7; margin:0 0 10px;
    word-break:keep-all;
  }
  .insta-cta a{
    display:inline-flex; align-items:center; gap:6px;
    background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    color:#fff;
    text-decoration:none;
    font-size:13px; font-weight:800;
    padding:9px 18px; border-radius:99px;
  }
  .insta-cta a:hover{opacity:.9;}

  .resultbtns{ display:flex; gap:10px; }
  .resultbtns button{
    flex:1;
    font-family:'Noto Sans KR',sans-serif;
    font-weight:800; font-size:13.5px;
    padding:13px 10px; border-radius:12px;
    cursor:pointer; border:none;
    letter-spacing:-.02em;
  }
  .resultbtns .primary{ background:var(--dark); color:#fff;}
  .resultbtns .secondary{ background:transparent; color:var(--dark); border:1.5px solid var(--line);}

  .footnote{
    text-align:center; font-size:11px; color:var(--soft); margin-top:18px;
  }

  /* ── Share Modal ── */
  .share-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s ease;}
  .share-overlay.open{opacity:1;pointer-events:all;}
  .share-modal{background:#fff;border-radius:22px;width:100%;max-width:360px;overflow:hidden;transform:translateY(20px) scale(.97);transition:transform .3s ease;box-shadow:0 24px 60px -10px rgba(0,0,0,.35);}
  .share-overlay.open .share-modal{transform:translateY(0) scale(1);}
  .share-card{background:linear-gradient(160deg,#fffdf5 0%,#fff8e0 100%);padding:28px 22px 20px;text-align:center;position:relative;}
  .share-card::before{content:'';display:block;height:10px;background:repeating-linear-gradient(135deg,#e8b400 0 14px,#171714 14px 28px);position:absolute;top:0;left:0;right:0;}
  .share-brand{font-size:11px;font-weight:700;letter-spacing:.12em;color:#9a9a90;margin-bottom:14px;margin-top:6px;}
  .share-img{width:150px;height:188px;border-radius:14px;overflow:hidden;margin:0 auto 14px;border:3px solid #e8b400;}
  .share-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
  .share-badge{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:#171714;padding:3px 10px;border-radius:99px;letter-spacing:.06em;margin-bottom:10px;}
  .share-name{font-size:22px;font-weight:900;color:#171714;margin:0 0 5px;letter-spacing:-.04em;word-break:keep-all;}
  .share-tagline{font-size:12.5px;color:#e84c2b;font-weight:700;margin:0 0 14px;word-break:keep-all;}
  .share-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;text-align:left;}
  .share-stat{background:#fff;border:1px solid #e0ddd4;border-radius:10px;padding:8px 10px;}
  .share-stat-name{font-size:10px;color:#9a9a90;font-weight:700;margin-bottom:3px;}
  .share-stat-stars{font-size:12px;color:#e8b400;letter-spacing:1px;}
  .share-stat-stars .off{color:#e0ddd4;}
  .share-footer{font-size:10.5px;color:#aaa;border-top:1px dashed #e0ddd4;padding-top:12px;margin-top:2px;font-weight:600;letter-spacing:.04em;}
  .share-footer a{color:#e8b400;text-decoration:underline;cursor:pointer;font-weight:700;}
  .share-actions{padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px;}
  .share-btn{width:100%;padding:13px;border-radius:12px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s ease;letter-spacing:-.02em;}
  .share-btn:hover{opacity:.88;}
  .share-btn.dl{background:#171714;color:#fff;}
  .share-btn.cp{background:#f5f2eb;color:#171714;border:1.5px solid #e0ddd4;}
  .share-close{width:100%;padding:10px;background:none;border:none;font-size:13px;color:#9a9a90;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
  .share-close:hover{color:#171714;}

</style>

  /* Action buttons below card */
  .share-actions{

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<body>

<div class="stage">
  <div class="card">
    <div class="tape"></div>
    <div class="pad" id="appRoot"></div>
  </div>
  <div class="footnote">사각사각 × K-SSTI (Korean Street Survival Type Indicator)</div>
</div>

<script>
const QUESTIONS = [
  { q:"핫플에 도착한 당신. 제일 먼저 하는 행동은?",
    opts:[
      {t:"저장해둔 팝업 위치부터 확인한다", type:"T1"},
      {t:"사진 찍을 분위기 좋은 카페부터 찾는다", type:"T4"},
      {t:"사람 많은 방향 따라 걷는다", type:"T5"},
      {t:"복잡해 보여서 다른 길을 고민한다", type:"T2"},
    ]},
  { q:"사람이 너무 많을 때 당신의 반응은?",
    opts:[
      {t:"그래도 볼 건 봐야 하니 원래 계획대로 움직인다", type:"T1"},
      {t:"사람이 없는 옆 골목으로 빠져나간다", type:"T2"},
      {t:"짜증나지만 참고 사람을 피하다보면 차랑 가까워진다", type:"T6"},
      {t:"너무 힘드니 앉을 수 있는 곳을 찾는다", type:"T3"},
    ]},
  { q:"핫플거리에서 가장 자주 겪는 상황은?",
    opts:[
      {t:"팝업 웨이팅 줄 발견", type:"T1"},
      {t:"사진 찍는 사람들 사이 정체", type:"T4"},
      {t:"사람 없는 곳으로 우회하다 멀리 돌아감", type:"T6"},
      {t:"어디가 길인지 헷갈려 잠시 멈춤", type:"T2"},
    ]},
  { q:'당신에게 "좋은 거리"란?',
    opts:[
      {t:"목적없이 걷다가도 우연한 걸 발견하는 곳", type:"T2"},
      {t:"오래 머물 수 있는 곳", type:"T3"},
      {t:"사람들이 많아도 불편하지 않은 곳", type:"T5"},
      {t:"차 걱정 없이 걸을 수 있는 곳", type:"T6"},
    ]},
  { q:"걷다가 가장 많이 하는 행동은?",
    opts:[
      {t:"지도 앱에서 저장한 곳을 검색한다", type:"T1"},
      {t:"주변 골목을 둘러본다", type:"T2"},
      {t:"앉을 곳을 찾는다", type:"T3"},
      {t:"사진 찍으려고 자주 멈춘다", type:"T4"},
    ]},
  { q:"핫플에서 가장 스트레스 받는 순간은?",
    opts:[
      {t:"사람이 몰려 길이 막힐 때", type:"T5"},
      {t:"앉을 곳 없을 때", type:"T3"},
      {t:"내가 어디 있는지 모르겠을 때", type:"T2"},
      {t:"차랑 너무 가까울 때", type:"T6"},
    ]},
  { q:'친구가 "여기 사람 너무 많다…"라고 하면 당신은?',
    opts:[
      {t:'"그래도 왔으니까 보고 가자"', type:"T1"},
      {t:'"일단 카페 들어가자"', type:"T3"},
      {t:'"우리 다른 길로 가보자"', type:"T2"},
      {t:'"사진만 찍고 가자"', type:"T4"},
    ]},
  { q:"거리에서 가장 자주 멈추는 이유는?",
    opts:[
      {t:"새로운 공간이 눈에 띄어서", type:"T1"},
      {t:"재밌는 골목이 보여서", type:"T2"},
      {t:"잠시 쉬고 싶어서", type:"T3"},
      {t:"사진을 찍고 싶어서", type:"T4"},
    ]},
  { q:"거리에서 가장 아까운 것은?",
    opts:[
      {t:"놓친 팝업이나 공간", type:"T1"},
      {t:"지나친 골목이나 풍경", type:"T2"},
      {t:"앉아 쉴 시간", type:"T3"},
      {t:"이동 때문에 낭비되는 시간", type:"T5"},
    ]},
  { q:"결국 당신의 거리 이용 방식은?",
    opts:[

    body:[

      "하지만 많은 핫플 거리는 머무르기보다 회전과 소비에 최적화되어 있습니다. 누구나 잠시 쉬어갈 수 있는 벤치와 공공 공간은 줄어들고, 머무르기 위해서는 소비가 전제되기도 합니다.",
      "어쩌면 잠시 쉬어갈 자리를 찾는 당신의 행동은 개인의 취향이 아니라, 도시에서 공공적 체류 공간이 점점 사라지는 것을 보여주는 신호일지도 모릅니다."

      "하지만 수많은 사람들이 같은 장면을 기록하기 시작할 때, 거리는 점점 경험하는 공간보다 보여지는 공간이 되어갑니다. 어쩌면 지금의 도시는 살아가는 공간이 아니라 소비되고 전시되는 공간으로 변해가고 있는지도 모릅니다."

let current = -1;
let answers = [];

const root = document.getElementById('appRoot');

function starString(n){
  let s = '';
  for(let i=0;i<5;i++) s += i < n ? '★' : '<span class="off">★</span>';
  return s;
}

function openShareModal(){ document.getElementById('shareOverlay').classList.add('open'); }
function closeShareModal(){ document.getElementById('shareOverlay').classList.remove('open'); }

function render(){
  if(current === -1) renderIntro();
  else if(current >=0 && current < QUESTIONS.length) renderQuestion(current);
  else renderResult();
}

function renderIntro(){
  root.innerHTML = `
    <span class="eyebrow">3분 소요 · K-SSTI</span>
    <div class="hashrow">
      <span>#인파지옥</span><span>#앉을자리없음</span><span>#차도생존기</span>
    </div>
    <h1 class="display"><span class="hl2">"주말 성수동 연무장길,<br>다들 예쁘게 입고<br>왜 차도로 걷고 있냐고요? 🚘🚶‍♂️"</span></h1>
    <p class="body">요즘 가장 힙한 팝업스토어, 감성 넘치는 카페들! 하지만 인스타 사진 속 화려함 뒤에 숨겨진 우리의 핫플 생존기는 그리 만만치 않습니다.</p>
    <p class="body">밀려드는 인파에 떠밀려 걷다 보면 어느새 차도로 내몰려 있고, 팝업스토어 대기 줄에 막혀 골목을 빙빙 우회하기 일쑤죠. 게다가 커피 한 잔을 결제하지 않으면 단 10분도 엉덩이 붙이고 편하게 쉴 수 있는 곳을 찾기 힘든 게 지금의 현실입니다. 🤯</p>
    <p class="body">혹시 내가 거리에서 유독 피로함을 느꼈던 게 정말 내 '성격'이나 '체력' 탓이었을까요? 어쩌면 지금의 도시 구조가 나에게 특정 행동을 강제하고 있었던 것은 아닐까요?</p>
    <p class="body">내가 거리를 마주하는 진짜 태도와, 험난한 도시 속 나의 <strong style="color:var(--caution)">'거리 생존력 배점'</strong>을 확인해 보세요! 나아가 우리가 미처 자각하지 못했던 진짜 도시의 이야기와 마주할 시간입니다.</p>
    <div class="meta-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#9a9a9f" stroke-width="2"/><path d="M12 7v5l3 3" stroke="#9a9a9f" stroke-width="2" stroke-linecap="round"/></svg>
      테스트 소요 시간: 3분 · 질문 10개
    </div>
    <button class="cta" id="startBtn">지금 나의 거리 생존 유형 확인하기 →</button>
  `;
  document.getElementById('startBtn').onclick = () => { current = 0; render(); };
}

function renderQuestion(i){
  const q = QUESTIONS[i];
  const pct = (i / QUESTIONS.length) * 100;
  root.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${i+1} / ${QUESTIONS.length}</div>
    </div>
    <div class="qnum">Q${i+1}.</div>
    <h2 class="qtitle">${q.q}</h2>
    <div class="options">
      ${q.opts.map((o, idx) => `<button class="opt" data-idx="${idx}"><span class="dot"></span><span>${o.t}</span></button>`).join('')}
    </div>
    <div class="navbar">
      <button class="backlink" id="backBtn" ${i===0 ? 'disabled' : ''}>← 이전 질문</button>
    </div>
  `;
  root.querySelectorAll('.opt').forEach(btn => {
    btn.onclick = () => {
      answers[i] = q.opts[parseInt(btn.dataset.idx)].type;
      current++;
      render();
    };
  });
  document.getElementById('backBtn').onclick = () => { if(i>0){ current--; render(); } };
}

function computeResult(){
  const counts = {T1:0,T2:0,T3:0,T4:0,T5:0,T6:0};
  answers.forEach(a => { if(a) counts[a]++; });
  return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
}

function renderResult(){
  const key = computeResult();
  const t = TYPES[key];
  root.innerHTML = `
    <div class="result-hero">
      <span class="typebadge">나의 거리 생존 유형</span>
      <div class="charwrap"><img src="${t.img}" alt="${t.name} 캐릭터"></div>
      <h2 class="resulttitle">${t.name}</h2>
      <p class="resultline">"${t.tagline}"</p>
    </div>

    <div class="statbox">
      <div class="statrow"><span class="statname">소비 성향</span><span class="stars">${starString(t.stats.consume)}</span></div>
      <div class="statrow"><span class="statname">탐험 성향</span><span class="stars">${starString(t.stats.explore)}</span></div>
      <div class="statrow"><span class="statname">체류 성향</span><span class="stars">${starString(t.stats.stay)}</span></div>
      <div class="statrow"><span class="statname">보행 민감도</span><span class="stars">${starString(t.stats.sense)}</span></div>
    </div>

    <div class="desc-block">
      ${t.body.map(p => `<p>${p}</p>`).join('')}
    </div>

    <div class="tagrow">
      ${t.tags.map(tag => `<span>${tag}</span>`).join('')}
    </div>

    <div class="insta-cta">
      <p>${t.ctaMsg}</p>
      <a href="${IG}" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="none" stroke="white" stroke-width="2"/><circle cx="12" cy="12" r="5" fill="none" stroke="white" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.5" fill="white"/></svg>
        @sagak00sagak 팔로우하기
      </a>
    </div>

    <div class="resultbtns">
      <button class="secondary" id="retryBtn">다시 테스트하기</button>
      <button class="primary" id="shareBtn">결과 공유하기</button>
    </div>
  `;
  document.getElementById('retryBtn').onclick = () => { current = -1; answers = []; render(); };
  // Share modal
  document.getElementById('shareBtn').onclick = () => {
    // populate card
    document.getElementById('shareCardImg').src = t.img;
    document.getElementById('shareCardImg').alt = t.name;
    document.getElementById('shareCardName').textContent = t.name;
    document.getElementById('shareCardTagline').textContent = '"' + t.tagline + '"';
    const statLabels = {consume:'소비 성향', explore:'탐험 성향', stay:'체류 성향', sense:'보행 민감도'};
    const statKeys = ['consume','explore','stay','sense'];
    document.getElementById('shareCardStats').innerHTML = statKeys.map(k => {
      let stars = '';
      for(let i=0;i<5;i++) stars += i < t.stats[k] ? '★' : '<span class="off">★</span>';
      return `<div class="share-stat"><div class="share-stat-name">${statLabels[k]}</div><div class="share-stat-stars">${stars}</div></div>`;
    }).join('');
    // open overlay
    document.getElementById('shareOverlay').classList.add('open');
  };

  // Download as image
  document.getElementById('shareDlBtn').onclick = () => {
    const card = document.getElementById('shareCard');
    const btn = document.getElementById('shareDlBtn');
    btn.textContent = '이미지 생성 중...';
    html2canvas(card, { scale:3, useCORS:true, backgroundColor:null }).then(canvas => {
      const a = document.createElement('a');
      a.download = 'K-SSTI_결과.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 21h14"/></svg> 저장됐어요 ✓';
      setTimeout(() => { btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 21h14"/></svg> 이미지로 저장하기'; }, 2000);
    });
  };

  // Share test link (always copy to clipboard)
  document.getElementById('shareCpBtn').onclick = () => {
    const label = document.getElementById('shareCpLabel');
    const shareUrl = 'https://sagak00sagak.github.io/K-SSTI/';
    navigator.clipboard?.writeText(shareUrl).catch(()=>{});
    label.textContent = '링크가 복사됐어요 ✓';
    setTimeout(() => { label.textContent = '테스트 공유하기'; }, 1800);
  };

  // Close
  document.getElementById('shareCloseBtn').onclick = () => {
    document.getElementById('shareOverlay').classList.remove('open');
  };
  document.getElementById('shareOverlay').onclick = (e) => {
    if(e.target === document.getElementById('shareOverlay'))
      document.getElementById('shareOverlay').classList.remove('open');
  };
}

render();
</script>

<div class="share-overlay" id="shareOverlay">
  <div class="share-modal">
    <div class="share-card" id="shareCard">
      <div class="share-brand">사각사각 K-SSTI</div>
      <div class="share-img"><img id="shareCardImg" src="" alt=""></div>
      <div class="share-badge">나의 거리 생존 유형</div>
      <div class="share-name" id="shareCardName"></div>
      <div class="share-tagline" id="shareCardTagline"></div>
      <div class="share-stats" id="shareCardStats"></div>
    </div>
    <div class="share-actions">
      <button class="share-btn dl" id="shareDlBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>
        이미지로 저장하기
      </button>
      <button class="share-btn cp" id="shareCpBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="shareCpLabel">테스트 공유하기</span>
      </button>
      <div class="share-hint">누르면 테스트 링크가 클립보드에 복사돼요</div>
      <button class="share-close" id="shareCloseBtn">닫기</button>
    </div>
  </div>
</div>
</body>
</html>
